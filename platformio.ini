; PlatformIO project configuration for the atmospheric methane detector.
;
; Target board is the Waveshare ESP32-S3-Zero (ESP32-S3FH4R2: 4 MB flash,
; 2 MB PSRAM, native USB). Waveshare does not publish an official PlatformIO
; board definition, so we use esp32-s3-devkitc-1, which wraps the same
; underlying chip. The flash size is overridden to 4 MB to match the FH4R2
; part; leaving it at the DevKitC default of 8 MB would produce a partition
; layout the chip cannot hold.
;
; PSRAM is deliberately left disabled. This firmware does not need it, and
; enabling it with the wrong SPI mode is a common cause of boot loops on the S3.
; Revisit if a future feature needs it.

[env:waveshare_esp32s3_zero]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Match the 4 MB flash on the ESP32-S3FH4R2.
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = default.csv

; Native USB CDC. Both flags are required for Serial to appear over the
; S3-Zero's built-in USB port (there is no separate UART-to-USB bridge).
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
; Decode stack traces into file:line on a crash, which saves a lot of time.
monitor_filters = esp32_exception_decoder

; Pinned dependencies. U8g2 is pinned to an exact release. DFRobot_GNSS is not
; on the PlatformIO registry under a stable name, so we vendor it straight from
; GitHub and pin a specific commit for reproducibility. If that commit ever
; disappears, drop the #<sha> suffix to track the default branch.
lib_deps =
    olikraus/U8g2@2.36.18
    https://github.com/DFRobot/DFRobot_GNSS.git#d4861cefa434e15a235459184bd27f81d8781416
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.14
